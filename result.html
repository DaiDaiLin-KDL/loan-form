<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>预约结果</title>
  <style>
    body{padding:20px;max-width:900px;margin:0 auto;}
    .card{border:1px solid #ddd;padding:24px;margin:20px 0;border-radius:8px;line-height:2.2;font-size:15px;}
    .row{display:flex;}
    .cell{padding:0 4px;min-width:140px;}
    .cell:nth-child(2){flex:1;}
    .tip{color:#0057ff;font-weight:bold;font-size:16px;margin:10px 0;}
    button{padding:10px 22px;font-size:15px;background:#0057ff;color:white;border:none;border-radius:6px;cursor:pointer;margin-top:10px;}
  </style>
</head>
<body>
<div class="card" id="card"></div>
<div class="tip">自行截图保存</div>
<button onclick="goFinish()">确定</button>
<script>
const params = new URLSearchParams(location.search);
const data = JSON.parse(decodeURIComponent(params.get("data")));
const submitTime = params.get("submitTime");
const card = document.getElementById("card");

const rows = [
  ["借款学生姓名：", data.stuName],
  ["身份证号：", data.idCard],
  ["手机号：", data.phone],
  ["户籍（区）：", data.district],
  ["户籍（镇/街道）：", data.street],
  ["高校(全称)：", data.school],
  ["专业：", data.major],
  ["学历：", data.education],
  ["学制（年）：", data.studyYear],
  ["本学年学费：", data.tuition],
  ["申请贷款金额：", data.loanMoney],
  ["家庭经济困难情况：", data.familyStatus],
  ["共同借款人姓名：", data.guaranteeName],
  ["与借款学生关系：", data.relation],
  ["共同借款人年龄：", data.guaranteeAge],
  ["共同借款人手机号：", data.guaranteePhone],
  ["现场办理项目：", data.handleType],
  ["预约日期：", data.orderDate],
  ["预约时段：", data.orderTime],
  ["提交日期：", submitTime]
];

rows.forEach(([k,v])=>{
  const r = document.createElement("div");
  r.className = "row";
  const c1 = document.createElement("div");c1.className="cell";c1.innerText=k;
  const c2 = document.createElement("div");c2.className="cell";c2.innerText=v||"";
  r.append(c1,c2);
  card.append(r);
});

function goFinish(){ location.href = "finish.html"; }
</script>
</body>
</html>
