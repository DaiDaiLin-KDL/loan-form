<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>预约结果</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="result-card" id="result-card">
    <div class="table-row">
      <div class="table-cell">序号：自动生成</div>
      <div class="table-cell">提交日期：<span id="submitTime"></span></div>
    </div>
    <div class="table-row"><div class="table-cell">借款学生姓名：</div><div class="table-cell" id="stuName"></div></div>
    <div class="table-row"><div class="table-cell">身份证号：</div><div class="table-cell" id="idCard"></div></div>
    <div class="table-row"><div class="table-cell">手机号：</div><div class="table-cell" id="phone"></div></div>
    <div class="table-row"><div class="table-cell">户籍（区）：</div><div class="table-cell" id="district"></div></div>
    <div class="table-row"><div class="table-cell">户籍（镇/街道）：</div><div class="table-cell" id="street"></div></div>
    <div class="table-row"><div class="table-cell">高校(全称)：</div><div class="table-cell" id="school"></div></div>
    <div class="table-row"><div class="table-cell">专业：</div><div class="table-cell" id="major"></div></div>
    <div class="table-row"><div class="table-cell">学历：</div><div class="table-cell" id="education"></div></div>
    <div class="table-row"><div class="table-cell">学制（年）：</div><div class="table-cell" id="studyYear"></div></div>
    <div class="table-row"><div class="table-cell">本学年学费：</div><div class="table-cell" id="tuition"></div></div>
    <div class="table-row"><div class="table-cell">申请贷款金额：</div><div class="table-cell" id="loanMoney"></div></div>
    <div class="table-row"><div class="table-cell">家庭经济困难情况：</div><div class="table-cell" id="familyStatus"></div></div>
    <div class="table-row"><div class="table-cell">共同借款人姓名：</div><div class="table-cell" id="guaranteeName"></div></div>
    <div class="table-row"><div class="table-cell">与借款学生关系：</div><div class="table-cell" id="relation"></div></div>
    <div class="table-row"><div class="table-cell">共同借款人年龄：</div><div class="table-cell" id="guaranteeAge"></div></div>
    <div class="table-row"><div class="table-cell">共同借款人手机号：</div><div class="table-cell" id="guaranteePhone"></div></div>
    <div class="table-row"><div class="table-cell">现场办理项目：</div><div class="table-cell" id="handleType"></div></div>
    <div class="table-row"><div class="table-cell">现场预约办理日期：</div><div class="table-cell" id="orderDate"></div></div>
    <div class="table-row"><div class="table-cell">预约时段：</div><div class="table-cell" id="orderTime"></div></div>
  </div>
  <div class="blue-bold">自行截图保存</div>
  <button class="btn" onclick="goFinish()">确定</button>
  <script>
    const params = new URLSearchParams(location.search);
    const data = JSON.parse(decodeURIComponent(params.get("data")));
    const submitTime = params.get("submitTime");
    document.getElementById("submitTime").innerText = submitTime;
    for(let key in data){
      const dom = document.getElementById(key);
      if(dom) dom.innerText = data[key];
    }
    function goFinish(){ location.href = "finish.html"; }
  </script>
</body>
</html>
