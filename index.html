<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>2026年禅城区生源地信用助学贷款</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
</head>
<body>
  <div id="app" class="form-container">
    <h2>2026年禅城区生源地信用助学贷款</h2>
    <el-form :model="form" :rules="rules" ref="formRef" label-width="160px">
      <el-form-item label="借款学生姓名" prop="stuName"><el-input v-model="form.stuName"></el-input></el-form-item>
      <el-form-item label="身份证号" prop="idCard"><el-input v-model="form.idCard"></el-input></el-form-item>
      <el-form-item label="手机号" prop="phone"><el-input v-model="form.phone"></el-input></el-form-item>
      <el-form-item label="户籍（区）" prop="district">
        <el-select v-model="form.district">
          <el-option label="禅城区" value="禅城区"></el-option>
          <el-option label="非禅城区" value="非禅城区"></el-option>
        </el-select>
      </el-form-item>
      <el-form-item label="户籍（镇/街道）" prop="street">
        <el-select v-model="form.street">
          <el-option label="祖庙街道" value="祖庙街道"></el-option>
          <el-option label="石湾镇街道" value="石湾镇街道"></el-option>
          <el-option label="张槎街道" value="张槎街道"></el-option>
          <el-option label="南庄镇" value="南庄镇"></el-option>
        </el-select>
      </el-form-item>
      <el-form-item label="高校(全称)" prop="school"><el-input v-model="form.school"></el-input></el-form-item>
      <el-form-item label="专业" prop="major"><el-input v-model="form.major"></el-input></el-form-item>
      <el-form-item label="学历" prop="education">
        <el-select v-model="form.education">
          <el-option label="大专" value="大专"></el-option>
          <el-option label="本科" value="本科"></el-option>
          <el-option label="研究生" value="研究生"></el-option>
        </el-select>
      </el-form-item>
      <el-form-item label="学制（年）" prop="studyYear"><el-input v-model="form.studyYear"></el-input></el-form-item>
      <el-form-item label="本学年学费" prop="tuition"><el-input v-model="form.tuition"></el-input></el-form-item>
      <el-form-item label="申请贷款金额" prop="loanMoney"><el-input v-model="form.loanMoney" placeholder="本科上限12000元/年，研究生上限16000元/年"></el-input></el-form-item>
      <el-form-item label="家庭经济困难情况" prop="familyStatus">
        <el-select v-model="form.familyStatus">
          <el-option label="脱贫不稳定户"></el-option>
          <el-option label="边缘易致贫户"></el-option>
          <el-option label="低保家庭"></el-option>
          <el-option label="特困救助供养学生"></el-option>
          <el-option label="孤儿"></el-option>
          <el-option label="残疾学生"></el-option>
          <el-option label="残疾人家庭子女"></el-option>
          <el-option label="突发严重困难家庭"></el-option>
          <el-option label="其他特殊困难"></el-option>
        </el-select>
      </el-form-item>
      <el-form-item label="共同借款人姓名" prop="guaranteeName"><el-input v-model="form.guaranteeName"></el-input></el-form-item>
      <el-form-item label="与借款学生关系" prop="relation">
        <el-select v-model="form.relation">
          <el-option label="父亲"></el-option>
          <el-option label="母亲"></el-option>
          <el-option label="其他"></el-option>
        </el-select>
      </el-form-item>
      <el-form-item label="共同借款人年龄" prop="guaranteeAge"><el-input v-model="form.guaranteeAge"></el-input></el-form-item>
      <el-form-item label="共同借款人手机号" prop="guaranteePhone"><el-input v-model="form.guaranteePhone"></el-input></el-form-item>
      <el-form-item label="现场办理项目" prop="handleType">
        <el-select v-model="form.handleType">
          <el-option label="首贷"></el-option>
          <el-option label="续贷"></el-option>
        </el-select>
      </el-form-item>
      <el-form-item label="现场预约办理日期" prop="orderDate">
        <el-date-picker v-model="form.orderDate" type="date" :disabled-date="disabledDate"></el-date-picker>
      </el-form-item>
      <el-form-item label="预约时段" prop="orderTime">
        <el-radio-group v-model="form.orderTime">
          <el-radio label="9:00-10:30" :disabled="timeLimit1">9:00-10:30</el-radio>
          <el-radio label="10:30-11:30" :disabled="timeLimit2">10:30-11:30</el-radio>
          <el-radio label="14:30-16:00" :disabled="timeLimit3">14:30-16:00</el-radio>
          <el-radio label="16:00-17:00" :disabled="timeLimit4">16:00-17:00</el-radio>
        </el-radio-group>
      </el-form-item>
      <el-form-item><el-button type="primary" @click="submitForm">提交预约登记</el-button></el-form-item>
    </el-form>
  </div>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
